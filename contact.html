<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact — AFTERIMAGE</title>
  <meta name="description" content="Get in touch with AFTERIMAGE by Studio Meyohas.">
  <link rel="stylesheet" href="styles.css">
  <style>
    /* ─── CONTACT-SPECIFIC ─── */

    .contact-hero {
      padding-top: clamp(4rem, 8vw, 6rem);
      padding-bottom: clamp(2rem, 4vw, 3rem);
    }

    .contact-hero .section-inner {
      max-width: 720px;
    }

    .contact-hero h2 {
      margin-bottom: 1.5rem;
    }

    /* ─── CONTACT LAYOUT ─── */

    .contact-grid {
      max-width: 580px;
      margin: 0 auto;
    }

    /* ─── FORM ─── */

    .contact-form-wrapper {
      border: 1px solid var(--grey-rule);
      padding: clamp(1.5rem, 3vw, 2.5rem);
    }

    .contact-form-header {
      font-family: var(--mono);
      font-size: 0.6rem;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--grey-mid);
      margin-bottom: 2rem;
      padding-bottom: 0.8rem;
      border-bottom: 1px solid var(--grey-rule);
      display: flex;
      justify-content: space-between;
    }

    .contact-form-header .label-ref {
      font-size: 0.55rem;
      color: var(--grey);
    }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1.5rem;
    }

    .contact-form .form-submit {
      margin-top: 0.5rem;
    }

    .contact-confirmation {
      display: none;
      padding: 2rem 0;
      text-align: center;
    }

    .contact-confirmation.show {
      display: block;
      opacity: 0;
      animation: fadeIn 0.6s ease forwards;
    }

    .contact-confirmation p {
      font-family: var(--mono);
      font-size: 0.6rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--grey-dark);
    }

    .contact-confirmation p + p {
      margin-top: 0.6rem;
      text-transform: none;
      letter-spacing: 0.04em;
      font-size: 0.85rem;
      font-family: 'Kalice', serif;
      color: var(--grey-mid);
    }

    /* ─── RESPONSIVE ─── */

    @media (max-width: 768px) {
      .form-row {
        grid-template-columns: 1fr;
        gap: 0;
      }

      .contact-form .form-submit {
        width: 100%;
      }
    }
  </style>
</head>
<body>

  <!-- NAV -->
  <nav class="nav">
    <a href="index.html">
      <img src="assets/images/web/logo-black.svg" alt="AFTERIMAGE" class="nav-logo">
    </a>
    <ul class="nav-links">
      <li><a href="index.html">Index</a></li>
      <li><a href="about.html">About</a></li>
      <li><a href="contact.html" class="active">Contact</a></li>
    </ul>
  </nav>

  <div class="page-body">

    <!-- HERO -->
    <section class="contact-hero">
      <div class="section-inner">
        <div class="section-label">
          <span>Contact</span>
        </div>
        <h2 class="reveal">Get in touch</h2>
        <p class="body-text reveal reveal-delay-1">For press inquiries, wholesale, collaborations, or general questions.</p>
      </div>
    </section>

    <hr class="rule">

    <!-- CONTACT CONTENT -->
    <section>
      <div class="section-inner">
        <div class="contact-grid">

          <!-- FORM -->
          <div class="contact-form-wrapper reveal">
            <div class="contact-form-header">
              <span>Leave a message</span>
              <span class="label-ref">Form</span>
            </div>
            <form class="contact-form" id="contact-form">
              <div class="form-row">
                <div class="form-group">
                  <label class="form-label" for="contact-name">Name</label>
                  <input type="text" id="contact-name" class="form-input" placeholder="Full name" required>
                </div>
                <div class="form-group">
                  <label class="form-label" for="contact-email">Email</label>
                  <input type="email" id="contact-email" class="form-input" placeholder="you@example.com" required>
                </div>
              </div>
              <div class="form-group">
                <label class="form-label" for="contact-subject">Subject</label>
                <input type="text" id="contact-subject" class="form-input" placeholder="What is this regarding?">
              </div>
              <div class="form-group">
                <label class="form-label" for="contact-message">Message</label>
                <textarea id="contact-message" class="form-textarea" placeholder="Your message" required></textarea>
              </div>
              <button type="submit" class="form-submit">Send message</button>
            </form>
            <div class="contact-confirmation" id="contact-confirmation">
              <p>Message received</p>
              <p>We'll respond as soon as possible.</p>
            </div>
          </div>

        </div>
      </div>
    </section>

  </div>

  <!-- FOOTER -->
  <footer>
    <div class="footer-inner">
      <div class="footer-links">
        <a href="index.html">Index</a>
        <a href="about.html">About</a>
        <a href="contact.html">Contact</a>
        <a href="https://instagram.com/afterimage.nyc" target="_blank" rel="noopener">Instagram</a>
      </div>
      <span class="footer-copy">&copy; 2026 AFTERIMAGE by Studio Meyohas</span>
    </div>
  </footer>

  <script>
    // Scroll reveal
    (function () {
      const els = document.querySelectorAll('.reveal');
      const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
          if (entry.isIntersecting) {
            entry.target.classList.add('visible');
            observer.unobserve(entry.target);
          }
        });
      }, { threshold: 0.12 });
      els.forEach(el => observer.observe(el));
    })();

    // Contact form
    document.getElementById('contact-form').addEventListener('submit', function (e) {
      e.preventDefault();
      this.style.display = 'none';
      document.getElementById('contact-confirmation').classList.add('show');
    });
  </script>

</body>
</html>
